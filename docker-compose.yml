services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: qr_order_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required — set it in .env}
      POSTGRES_DB: ${POSTGRES_DB:-qr_order}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Ports intentionally NOT exposed in production — use docker network
    # Uncomment for local development access:
    # ports:
    #   - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:7-alpine
    container_name: qr_order_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    volumes:
      - redis_data:/data
    # Ports intentionally NOT exposed in production — use docker network
    # Uncomment for local development access:
    # ports:
    #   - "6379:6379"
    environment:
      REDISCLI_AUTH: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: qr_order_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?required}@postgres:5432/${POSTGRES_DB:-qr_order}?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379
      # REQUIRED: Must be set via .env or environment — no defaults for security
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?JWT_ACCESS_SECRET is required — set it in .env}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required — set it in .env}
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173,http://localhost:5174}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@example.com}
      # Twilio (WhatsApp / OTP)
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_VERIFY_SERVICE_SID: ${TWILIO_VERIFY_SERVICE_SID:-}
      TWILIO_WHATSAPP_FROM: ${TWILIO_WHATSAPP_FROM:-}
      # Twilio WhatsApp Content Template SIDs
      TWILIO_TPL_LOW_STOCK: ${TWILIO_TPL_LOW_STOCK:-}
      TWILIO_TPL_STAFF_LATE: ${TWILIO_TPL_STAFF_LATE:-}
      TWILIO_TPL_EARLY_CHECKOUT: ${TWILIO_TPL_EARLY_CHECKOUT:-}
      TWILIO_TPL_ORDER_INVOICE: ${TWILIO_TPL_ORDER_INVOICE:-}
      # AI chatbot
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads_data:/app/packages/backend/uploads
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Customer PWA
  customer:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        PACKAGE_PATH: packages/customer
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000/api}
        VITE_SOCKET_URL: ${VITE_SOCKET_URL:-http://localhost:3000}
        VITE_CUSTOMER_URL: ${VITE_CUSTOMER_URL:-http://localhost:5173}
    container_name: qr_order_customer
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

  # Admin Panel
  admin:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        PACKAGE_PATH: packages/admin
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000/api}
        VITE_SOCKET_URL: ${VITE_SOCKET_URL:-http://localhost:3000}
        VITE_CUSTOMER_URL: ${VITE_CUSTOMER_URL:-http://localhost:5173}
    container_name: qr_order_admin
    restart: unless-stopped
    ports:
      - "5174:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  uploads_data:
