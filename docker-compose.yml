services:
  # Redis
  redis:
    image: redis:7-alpine
    container_name: qr_order_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    volumes:
      - redis_data:/data
    # Ports intentionally NOT exposed in production — use docker network
    # Uncomment for local development access:
    # ports:
    #   - "6379:6379"
    environment:
      REDISCLI_AUTH: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: qr_order_backend
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 3000
    ports:
      - "3000:3000"
    volumes:
      - uploads_data:/app/packages/backend/uploads
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Customer PWA
  customer:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        PACKAGE_PATH: packages/customer
        VITE_API_URL: ${VITE_API_URL:-https://api.infynarc.com/api}
        VITE_SOCKET_URL: ${VITE_SOCKET_URL:-https://api.infynarc.com}
        VITE_CUSTOMER_URL: ${VITE_CUSTOMER_URL:-https://qorderscan.infynarc.com}
    container_name: qr_order_customer
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

  # Admin Panel
  admin:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        PACKAGE_PATH: packages/admin
        VITE_API_URL: ${VITE_API_URL:-https://api.infynarc.com/api}
        VITE_SOCKET_URL: ${VITE_SOCKET_URL:-https://api.infynarc.com}
        VITE_CUSTOMER_URL: ${VITE_CUSTOMER_URL:-https://qorderscan.infynarc.com}
    container_name: qr_order_admin
    restart: unless-stopped
    ports:
      - "5174:80"
    depends_on:
      - backend

volumes:
  redis_data:
  uploads_data:
