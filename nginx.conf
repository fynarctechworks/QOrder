events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    server {
        listen 80;
        server_name qorderadmin.infynarc.com qorderscan.infynarc.com;

        client_max_body_size 10m;

        # In production, redirect all HTTP traffic to HTTPS.
        # Uncomment the following block and comment out the rest of this server block.
        # return 301 https://$host$request_uri;

        root /usr/share/nginx/html;
        index index.html;

        # Hide Nginx version
        server_tokens off;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self'; connect-src 'self' https: wss:; frame-ancestors 'self'" always;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            # Repeat security headers in nested locations (nginx replaces parent headers)
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self'; connect-src 'self' https: wss:; frame-ancestors 'self'" always;
        }

        # Service worker - no cache
        location /sw.js {
            add_header Cache-Control "no-cache";
            add_header X-Content-Type-Options "nosniff" always;
            expires 0;
        }

        # SPA fallback
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Health check
        location /health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }
    }

    # ── HTTPS server (uncomment when SSL certificates are available) ──
    # To enable: obtain certs via Let's Encrypt / certbot, place them at the paths below,
    # uncomment this block, and enable the HTTP→HTTPS redirect above.
    #
    # server {
    #     listen 443 ssl http2;
    #     server_name your-domain.com;
    #
    #     ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    #
    #     # Modern TLS configuration
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    #     ssl_prefer_server_ciphers off;
    #
    #     # HSTS (uncomment only after confirming HTTPS works)
    #     # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    #
    #     server_tokens off;
    #
    #     root /usr/share/nginx/html;
    #     index index.html;
    #
    #     # Security headers
    #     add_header X-Frame-Options "SAMEORIGIN" always;
    #     add_header X-Content-Type-Options "nosniff" always;
    #     add_header X-XSS-Protection "1; mode=block" always;
    #     add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    #
    #     location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
    #         expires 1y;
    #         add_header Cache-Control "public, immutable";
    #         add_header X-Frame-Options "SAMEORIGIN" always;
    #         add_header X-Content-Type-Options "nosniff" always;
    #         add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    #     }
    #
    #     location /sw.js {
    #         add_header Cache-Control "no-cache";
    #         add_header X-Content-Type-Options "nosniff" always;
    #         expires 0;
    #     }
    #
    #     location / {
